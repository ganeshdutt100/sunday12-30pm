<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            background-color: rgb(11, 9, 48);
        }

        .mainBox {
            /* display: flex;
            justify-content: space-around;
            align-items: center; */
            height: 900px;
            width: 700px;
            background-color: rgb(128, 106, 99);
            position: relative;
        }

        .box {
            margin-top: 5px;
            background-color: red;
            width: 150px;
            height: 150px;
            font-size: 40px;
            text-align: center;
        }

        .box2 {
            background-color: blue;
        }

        .box3 {
            background-color: rgb(81, 255, 0);
        }

        .box4 {
            background-color: rgb(255, 157, 0);
            position: absolute;
            /* top: 0; */
            bottom: 0;
            right: 0;
            /* left: 0; */
            z-index: 1;
        }

        .box5 {
            background-color: rgb(255, 0, 217);
        }
    </style>
</head>

<body>
    <div class="mainBox">
        <div class=" box box1">1</div>
        <div class=" box box2">2</div>
        <div class=" box box3">3</div>
        <div class=" box box4">4</div>
        <div class=" box box5">5</div>
    </div>
</body>

</html>
